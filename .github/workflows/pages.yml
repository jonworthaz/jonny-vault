name: Deploy MarkUp tool (Pages)

# Runs on the repository's DEFAULT branch (the only ref GitHub Pages allows to
# deploy via Actions). It checks out `main` and publishes the image-annotator/
# folder as the site root, so the tool is served over https.

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload the tool as the site
        uses: actions/upload-pages-artifact@v3
        with:
          path: image-annotator

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

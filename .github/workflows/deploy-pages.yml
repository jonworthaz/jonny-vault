name: Deploy MarkUp tool to GitHub Pages

# Publishes the image-annotator/ folder as the site root, so the tool is served
# at https://<owner>.github.io/<repo>/ — where the Copy-to-clipboard feature
# works reliably (https is a trusted origin).

on:
  push:
    branches: [main]
    paths:
      - "image-annotator/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload the tool as the site
        uses: actions/upload-pages-artifact@v3
        with:
          path: image-annotator

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

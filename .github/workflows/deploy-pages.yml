name: Deploy tools to GitHub Pages

# Publishes the static tools to GitHub Pages as siblings, with Claude Ideas as the
# front door:
#   • /                  → redirects to /claude-ideas/
#   • /claude-ideas/      → Claude Ideas (idea → launch core system)
#   • /workflow-builder/ → Forge (visual workflow builder)
#   • /image-annotator/  → MarkUp (image annotation)
# Serving over https keeps clipboard / download features working reliably.

on:
  push:
    branches: [main]
    paths:
      - "claude-ideas/**"
      - "image-annotator/**"
      - "workflow-builder/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Assemble the site
        run: |
          mkdir -p _site/claude-ideas _site/workflow-builder _site/image-annotator
          cp -r claude-ideas/.      _site/claude-ideas/
          cp -r workflow-builder/. _site/workflow-builder/
          cp -r image-annotator/.  _site/image-annotator/
          # root redirect → Claude Ideas (the front door)
          printf '<!doctype html><meta charset="utf-8"><meta http-equiv="refresh" content="0; url=./claude-ideas/">\n<title>Claude Ideas</title><a href="./claude-ideas/">Go to Claude Ideas</a>\n' > _site/index.html

      - name: Upload the site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Deploy tools to GitHub Pages

# Publishes the static tools to GitHub Pages:
#   • image-annotator/  → the site root  (https://<owner>.github.io/<repo>/)
#   • workflow-builder/  → /workflow-builder/
# Serving over https keeps clipboard / download features working reliably.

on:
  push:
    branches: [main]
    paths:
      - "image-annotator/**"
      - "workflow-builder/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Assemble the site
        run: |
          mkdir -p _site/workflow-builder
          cp -r image-annotator/. _site/
          cp -r workflow-builder/. _site/workflow-builder/

      - name: Upload the site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

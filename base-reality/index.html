<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Base Reality — one app, many tools</title>
  <meta name="description" content="Base Reality: small, sharp tools for personal, business and AI work — one installable app, one shared data store." />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon-192.png" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <meta name="theme-color" content="#13111c" />
  <style>
    :root{
      --bg:#13111c; --panel:#1c1928; --panel2:#262236; --line:#332e47;
      --text:#ece9f7; --muted:#9a93b5; --accent:#8b5cf6; --accent-h:#a78bfa;
      --ok:#22c55e; --warn:#f59e0b; --bad:#ef4444; --blue:#38bdf8;
    }
    *{box-sizing:border-box}
    html,body{margin:0;height:100%}
    body{background:var(--bg);color:var(--text);line-height:1.5;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      display:flex;flex-direction:column;min-height:100vh}
    a{color:var(--accent-h)}
    header{display:flex;align-items:center;gap:12px;padding:10px 16px;
      border-bottom:1px solid var(--line);background:var(--panel);position:sticky;top:0;z-index:20}
    .logo{width:30px;height:30px;border-radius:8px;flex:0 0 auto;
      background:linear-gradient(180deg,#8b5cf6,#4c1d95);display:grid;place-items:center;
      color:#fff;font-weight:800;font-size:17px}
    .brand{font-weight:700;font-size:17px}
    .brand small{display:block;font-weight:400;font-size:11px;color:var(--muted);margin-top:-3px}
    .hspace{flex:1}
    .btn{border:0;cursor:pointer;background:var(--accent);color:#fff;font-weight:600;font-size:14px;
      padding:9px 14px;border-radius:9px;text-decoration:none;display:inline-flex;align-items:center;gap:7px;
      transition:filter .12s}
    .btn:hover{filter:brightness(1.12)}
    .btn.ghost{background:var(--panel2);border:1px solid var(--line);color:var(--text)}
    .btn.small{padding:6px 10px;font-size:13px}
    .btn.danger{background:#7f1d1d}
    .btn:disabled{opacity:.5;cursor:default}
    .layout{display:flex;flex:1;min-height:0}
    nav{width:212px;flex:0 0 auto;border-right:1px solid var(--line);background:var(--panel);
      padding:12px 8px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
    nav a{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:9px;
      color:var(--text);text-decoration:none;font-size:14px}
    nav a:hover{background:var(--panel2)}
    nav a.active{background:var(--panel2);outline:1px solid var(--line)}
    nav .navletter{width:24px;height:24px;border-radius:6px;display:grid;place-items:center;
      font-size:12px;font-weight:800;color:#fff;flex:0 0 auto}
    nav .navsec{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);
      padding:12px 10px 4px}
    main{flex:1;overflow-y:auto;padding:22px;min-width:0}
    .wrap{max-width:1000px;margin:0 auto}
    h1{font-size:24px;margin:0 0 4px}
    h2{font-size:18px;margin:22px 0 10px}
    .sub{color:var(--muted);margin:0 0 18px;font-size:14px}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px}
    .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;
      display:flex;flex-direction:column;gap:8px}
    .card .mletter{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;
      font-weight:800;font-size:18px;color:#fff}
    .card h3{margin:2px 0 0;font-size:16px}
    .card p{margin:0;color:var(--muted);font-size:13px;flex:1}
    .pill{align-self:flex-start;font-size:11px;text-transform:uppercase;letter-spacing:.06em;
      color:var(--muted);background:var(--panel2);border:1px solid var(--line);
      padding:2px 8px;border-radius:999px}
    /* shared form / table components for modules */
    .br-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .br-field{display:flex;flex-direction:column;gap:4px;font-size:13px;color:var(--muted)}
    input,select,textarea{background:var(--panel2);border:1px solid var(--line);border-radius:8px;
      color:var(--text);padding:8px 10px;font-size:14px;font-family:inherit}
    input:focus,select:focus,textarea:focus{outline:1px solid var(--accent)}
    textarea{resize:vertical}
    table.br{width:100%;border-collapse:collapse;font-size:14px}
    table.br th,table.br td{border-bottom:1px solid var(--line);padding:8px 8px;text-align:left;vertical-align:top}
    table.br th{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.05em}
    .muted{color:var(--muted)} .ok{color:var(--ok)} .warn{color:var(--warn)} .bad{color:var(--bad)}
    .panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px}
    .stat{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:12px 14px;min-width:130px}
    .stat b{display:block;font-size:20px}
    .stat span{font-size:12px;color:var(--muted)}
    .drop{border:2px dashed var(--line);border-radius:14px;padding:34px;text-align:center;color:var(--muted);
      cursor:pointer;transition:border-color .15s}
    .drop.on{border-color:var(--accent);color:var(--text)}
    #toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--panel2);
      border:1px solid var(--line);border-radius:10px;padding:10px 16px;font-size:14px;display:none;z-index:99}
    .tierline{display:flex;gap:12px;flex-wrap:wrap}
    .tier{flex:1;min-width:200px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px}
    .tier.hot{border-color:var(--accent)}
    .tier b{font-size:16px}
    .tier .price{font-size:22px;font-weight:800;margin:6px 0}
    .tier ul{margin:8px 0 0;padding-left:18px;font-size:13px;color:var(--muted)}
    footer{border-top:1px solid var(--line);padding:14px;text-align:center;color:var(--muted);font-size:12px}
    @media(max-width:760px){
      nav{position:fixed;left:-230px;top:51px;bottom:0;z-index:30;transition:left .18s}
      nav.open{left:0}
      #menuBtn{display:inline-flex}
    }
    #menuBtn{display:none}
    @media(min-width:761px){#menuBtn{display:none!important}}
  </style>
</head>
<body>
  <header>
    <button class="btn ghost small" id="menuBtn">☰</button>
    <div class="logo">B</div>
    <div class="brand">Base Reality<small>one app · many tools · your data stays local</small></div>
    <div class="hspace"></div>
    <button class="btn ghost small" id="installBtn" hidden>⬇ Install app</button>
    <a class="btn ghost small" href="#/settings">⚙ Settings</a>
  </header>

  <div class="layout">
    <nav id="nav"></nav>
    <main><div class="wrap" id="view"></div></main>
  </div>

  <footer>Base Reality · local-first — everything is stored in your browser, nothing is uploaded ·
    early access: all modules unlocked</footer>
  <div id="toast"></div>

  <script>
  // ---------- Base Reality shell: registry, shared store, helpers ----------
  const BR = {
    modules: [],
    register(m){ this.modules.push(m); },

    // Namespaced local store. One source of truth for every module.
    store: {
      get(key, def){ try{ const v = localStorage.getItem('br:'+key); return v===null?def:JSON.parse(v); }catch(e){ return def; } },
      set(key, val){ localStorage.setItem('br:'+key, JSON.stringify(val)); },
      del(key){ localStorage.removeItem('br:'+key); },
      keys(){ return Object.keys(localStorage).filter(k=>k.startsWith('br:')).map(k=>k.slice(3)); }
    },

    // Shared entities — entered once, used by every module.
    profile(){ return BR.store.get('shared:profile', {business:'',owner:'',email:'',phone:'',address:'',currency:'£',vatRate:20,vatNo:''}); },
    saveProfile(p){ BR.store.set('shared:profile', p); },
    clients(){ return BR.store.get('shared:clients', []); },
    saveClients(c){ BR.store.set('shared:clients', c); },

    money(n){ const cur = BR.profile().currency || '£';
      return cur + (Math.round(n*100)/100).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}); },
    uid(){ return Math.random().toString(36).slice(2,10); },
    esc(s){ return String(s??'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); },
    toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.style.display='block';
      clearTimeout(BR._tt); BR._tt=setTimeout(()=>t.style.display='none', 2200); },
    download(name, content, type){ const blob = content instanceof Blob ? content : new Blob([content],{type:type||'text/plain'});
      const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; a.click();
      setTimeout(()=>URL.revokeObjectURL(a.href), 5000); }
  };
  window.BR = BR;
  </script>

  <!-- ---------- Modules (each registers itself with BR) ---------- -->
  <script src="modules/csv-cleaner.js"></script>
  <script src="modules/prompt-vault.js"></script>
  <script src="modules/screenshot-beautifier.js"></script>
  <script src="modules/renewal-radar.js"></script>
  <script src="modules/quote-builder.js"></script>
  <script src="modules/pdf-toolkit.js"></script>

  <script>
  // ---------- Router + views ----------
  const view = document.getElementById('view');
  const nav = document.getElementById('nav');
  let activeModule = null;

  function buildNav(){
    let h = `<a href="#/" data-r="/">🏠 <span>Home</span></a><div class="navsec">Modules</div>`;
    for(const m of BR.modules){
      h += `<a href="#/m/${m.id}" data-r="/m/${m.id}">
        <span class="navletter" style="background:${m.color}">${m.letter}</span><span>${m.name}</span></a>`;
    }
    h += `<div class="navsec">App</div><a href="#/settings" data-r="/settings">⚙ <span>Settings</span></a>`;
    nav.innerHTML = h;
  }

  function renderHome(){
    document.title = 'Base Reality — one app, many tools';
    let cards = '';
    for(const m of BR.modules){
      cards += `<div class="card">
        <div class="mletter" style="background:${m.color}">${m.letter}</div>
        <span class="pill">${m.tag}</span>
        <h3>${m.name}</h3><p>${m.blurb}</p>
        <a class="btn" href="#/m/${m.id}">Open</a></div>`;
    }
    view.innerHTML = `
      <h1>Welcome to Base Reality</h1>
      <p class="sub">Small, sharp tools for personal, business and AI work — in one installable app.
      Everything runs and stays on <b>your</b> device. Set your business details once in
      <a href="#/settings">Settings</a> and every module uses them.</p>
      <div class="grid">${cards}</div>
      <h2>Pricing (early access — everything is unlocked)</h2>
      <div class="tierline">
        <div class="tier"><b>Singles</b><div class="price">£5–£29</div>
          <ul><li>Own one module outright</li><li>Yours forever, updates included</li></ul></div>
        <div class="tier"><b>Bundles</b><div class="price">25–40% off</div>
          <ul><li>Pick 3 — 25% off</li><li>Pick 5 — 40% off</li><li>Themed packs</li></ul></div>
        <div class="tier hot"><b>All-Access</b><div class="price">£12/mo</div>
          <ul><li>Every module, current and future</li><li>New modules land inside the same app</li></ul></div>
      </div>`;
  }

  function renderSettings(){
    document.title = 'Settings — Base Reality';
    const p = BR.profile();
    view.innerHTML = `
      <h1>Settings</h1>
      <p class="sub">Your shared profile — the single source of truth every module reads from.</p>
      <div class="panel"><h2 style="margin-top:0">Business / personal profile</h2>
        <div class="br-row">
          <label class="br-field">Business / name<input id="s_business" value="${BR.esc(p.business)}"></label>
          <label class="br-field">Contact name<input id="s_owner" value="${BR.esc(p.owner)}"></label>
          <label class="br-field">Email<input id="s_email" value="${BR.esc(p.email)}"></label>
          <label class="br-field">Phone<input id="s_phone" value="${BR.esc(p.phone)}"></label>
        </div>
        <div class="br-row" style="margin-top:10px">
          <label class="br-field">Address<textarea id="s_address" rows="2" style="min-width:280px">${BR.esc(p.address)}</textarea></label>
          <label class="br-field">Currency symbol<input id="s_currency" value="${BR.esc(p.currency)}" style="width:70px"></label>
          <label class="br-field">Default VAT %<input id="s_vat" type="number" value="${p.vatRate}" style="width:90px"></label>
          <label class="br-field">VAT number<input id="s_vatno" value="${BR.esc(p.vatNo)}"></label>
        </div>
        <div class="br-row" style="margin-top:14px"><button class="btn" id="saveProfile">Save profile</button></div>
      </div>
      <div class="panel"><h2 style="margin-top:0">Backup</h2>
        <p class="sub">One backup covers every module — export it anywhere, import it on any device.</p>
        <div class="br-row">
          <button class="btn ghost" id="exportAll">⬇ Export all data (JSON)</button>
          <button class="btn ghost" id="importAll">⬆ Import backup</button>
          <input type="file" id="importFile" accept=".json" hidden>
          <button class="btn danger" id="wipeAll">Erase all local data</button>
        </div>
      </div>`;
    document.getElementById('saveProfile').onclick = () => {
      BR.saveProfile({ business:s_business.value.trim(), owner:s_owner.value.trim(), email:s_email.value.trim(),
        phone:s_phone.value.trim(), address:s_address.value, currency:s_currency.value.trim()||'£',
        vatRate:parseFloat(s_vat.value)||0, vatNo:s_vatno.value.trim() });
      BR.toast('Profile saved — all modules will use it');
    };
    document.getElementById('exportAll').onclick = () => {
      const data = {}; for(const k of BR.store.keys()) data[k] = BR.store.get(k);
      BR.download('base-reality-backup.json', JSON.stringify({app:'base-reality',exported:new Date().toISOString(),data},null,2), 'application/json');
    };
    document.getElementById('importAll').onclick = () => importFile.click();
    document.getElementById('importFile').onchange = e => {
      const f = e.target.files[0]; if(!f) return;
      const r = new FileReader();
      r.onload = () => { try{
          const j = JSON.parse(r.result);
          if(!j.data) throw new Error('not a Base Reality backup');
          for(const [k,v] of Object.entries(j.data)) BR.store.set(k, v);
          BR.toast('Backup imported'); route();
        }catch(err){ BR.toast('Import failed: '+err.message); } };
      r.readAsText(f);
    };
    document.getElementById('wipeAll').onclick = () => {
      if(confirm('Erase ALL Base Reality data stored in this browser? This cannot be undone.')){
        for(const k of BR.store.keys()) BR.store.del(k);
        BR.toast('All local data erased'); route();
      }
    };
  }

  function route(){
    if(activeModule && activeModule.unmount) { try{ activeModule.unmount(); }catch(e){} }
    activeModule = null;
    const hash = location.hash.replace(/^#/,'') || '/';
    nav.classList.remove('open');
    nav.querySelectorAll('a').forEach(a => a.classList.toggle('active', a.dataset.r === hash));
    if(hash === '/' ) return renderHome();
    if(hash === '/settings') return renderSettings();
    const mm = hash.match(/^\/m\/(.+)$/);
    if(mm){
      const m = BR.modules.find(x=>x.id===mm[1]);
      if(m){ document.title = m.name + ' — Base Reality';
        view.innerHTML = ''; activeModule = m; m.render(view); return; }
    }
    renderHome();
  }

  buildNav();
  window.addEventListener('hashchange', route);
  route();
  document.getElementById('menuBtn').onclick = () => nav.classList.toggle('open');

  // ---------- PWA: install prompt + service worker ----------
  let deferredPrompt = null;
  const installBtn = document.getElementById('installBtn');
  window.addEventListener('beforeinstallprompt', e => { e.preventDefault(); deferredPrompt = e; installBtn.hidden = false; });
  installBtn.onclick = async () => { if(!deferredPrompt) return;
    deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt = null; installBtn.hidden = true; };
  window.addEventListener('appinstalled', () => BR.toast('Base Reality installed — it now works offline'));
  if('serviceWorker' in navigator && location.protocol !== 'file:')
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  </script>
</body>
</html>
